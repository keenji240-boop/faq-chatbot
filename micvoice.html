<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iOS Web Speech API Test</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a, #1e1b4b);
            --card-bg: rgba(30, 41, 59, 0.7);
            --card-border: rgba(255, 255, 255, 0.08);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --primary-accent: #6366f1;
            --primary-glow: rgba(99, 102, 241, 0.5);
            --success-accent: #10b981;
            --success-glow: rgba(16, 185, 129, 0.4);
            --error-accent: #ef4444;
            --warning-accent: #f59e0b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg-gradient);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 600px;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            padding: 30px;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        header {
            text-align: center;
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }

        p.subtitle {
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        .status-card {
            background: rgba(15, 23, 42, 0.4);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 16px;
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .status-indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background-color: var(--text-secondary);
            position: relative;
        }

        .status-indicator.active {
            background-color: var(--primary-accent);
            box-shadow: 0 0 12px var(--primary-glow);
            animation: pulse 1.5s infinite;
        }

        .status-indicator.speaking {
            background-color: var(--success-accent);
            box-shadow: 0 0 12px var(--success-glow);
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.95); opacity: 0.5; }
            50% { transform: scale(1.15); opacity: 1; }
            100% { transform: scale(0.95); opacity: 0.5; }
        }

        .status-text {
            font-weight: 500;
            font-size: 1rem;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .toggle-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.03);
            padding: 12px 16px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .toggle-label {
            font-size: 0.95rem;
            font-weight: 500;
            color: var(--text-primary);
        }

        /* Modern Toggle Switch */
        .switch {
            position: relative;
            display: inline-block;
            width: 48px;
            height: 24px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #4b5563;
            transition: .3s;
            border-radius: 24px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .3s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: var(--primary-accent);
        }

        input:checked + .slider:before {
            transform: translateX(24px);
        }

        .main-btn {
            background: linear-gradient(135deg, var(--primary-accent), #4f46e5);
            color: white;
            border: none;
            border-radius: 16px;
            padding: 16px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .main-btn:active {
            transform: scale(0.98);
        }

        .main-btn:hover {
            opacity: 0.95;
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.4);
        }

        .secondary-actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .sec-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-primary);
            border-radius: 12px;
            padding: 12px;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .sec-btn:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        /* Displays */
        .text-display {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 16px;
            min-height: 80px;
        }

        .text-display-title {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .text-display-content {
            font-size: 1.05rem;
            line-height: 1.5;
        }

        .text-display-content.placeholder {
            color: var(--text-secondary);
            font-style: italic;
        }

        /* Terminal Console Logs for Mobile Debugging */
        .console-container {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .console-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .console-title {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-secondary);
            font-weight: 600;
        }

        .clear-console {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 0.8rem;
            text-decoration: underline;
        }

        .console-log {
            background: #020617;
            border: 1px solid var(--card-border);
            border-radius: 12px;
            padding: 12px;
            height: 180px;
            overflow-y: auto;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            line-height: 1.6;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .log-entry {
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            padding-bottom: 4px;
        }

        .log-time {
            color: #64748b;
            margin-right: 6px;
        }

        .log-info { color: #94a3b8; }
        .log-success { color: var(--success-accent); }
        .log-error { color: var(--error-accent); font-weight: 600; }
        .log-warning { color: var(--warning-accent); }

        /* iPhone Mute Warning Card */
        .info-banner {
            background: rgba(245, 158, 11, 0.1);
            border: 1px solid rgba(245, 158, 11, 0.2);
            color: #fef3c7;
            border-radius: 16px;
            padding: 14px;
            font-size: 0.85rem;
            line-height: 1.4;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>iOS Web Speech Test</h1>
            <p class="subtitle">マイク認識 ＆ 非同期読み上げテスト</p>
        </header>

        <div class="info-banner">
            <strong>⚠️ iPhoneでの注意点:</strong><br>
            1. 側面の<strong>消音（マナー）モードスイッチをオフ</strong>にしてください。<br>
            2. 認識後の「読み上げ」は通常2秒の遅延（FAQ取得シミュレート）後に再生されます。
        </div>

        <div class="status-card">
            <div id="statusIndicator" class="status-indicator"></div>
            <div id="statusText" class="status-text">準備完了 (Ready)</div>
        </div>

        <div class="control-group">
            <div class="toggle-container">
                <span class="toggle-label">iOS 対策用事前アンロック</span>
                <label class="switch">
                    <input type="checkbox" id="workaroundToggle" checked>
                    <span class="slider"></span>
                </label>
            </div>

            <button id="startBtn" class="main-btn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/>
                    <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
                    <line x1="12" x2="12" y1="19" y2="22"/>
                </svg>
                話しかけてテスト開始
            </button>
        </div>

        <div class="secondary-actions">
            <button id="directSpeakBtn" class="sec-btn">即時読み上げテスト</button>
            <button id="unlockBtn" class="sec-btn">手動アンロックのみ実行</button>
        </div>

        <div>
            <div class="text-display-title">聞き取った音声</div>
            <div class="text-display">
                <div id="recognizedText" class="text-display-content placeholder">ここに音声認識結果が表示されます...</div>
            </div>
        </div>

        <div>
            <div class="text-display-title">読み上げテキスト</div>
            <div class="text-display">
                <div id="spokenText" class="text-display-content placeholder">ここに読み上げるFAQの回答が表示されます...</div>
            </div>
        </div>

        <div class="console-container">
            <div class="console-header">
                <span class="console-title">Debug Console</span>
                <button id="clearConsole" class="clear-console">Clear</button>
            </div>
            <div id="debugConsole" class="console-log"></div>
        </div>
    </div>

    <script>
        const statusIndicator = document.getElementById('statusIndicator');
        const statusText = document.getElementById('statusText');
        const startBtn = document.getElementById('startBtn');
        const directSpeakBtn = document.getElementById('directSpeakBtn');
        const unlockBtn = document.getElementById('unlockBtn');
        const workaroundToggle = document.getElementById('workaroundToggle');
        const recognizedTextDiv = document.getElementById('recognizedText');
        const spokenTextDiv = document.getElementById('spokenText');
        const debugConsole = document.getElementById('debugConsole');
        const clearConsoleBtn = document.getElementById('clearConsole');

        // On-screen console logger for mobile debugging
        function log(message, type = 'info') {
            const entry = document.createElement('div');
            entry.className = `log-entry log-${type}`;
            
            const now = new Date();
            const timeStr = `${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}:${now.getSeconds().toString().padStart(2, '0')}.${now.getMilliseconds().toString().padStart(3, '0')}`;
            
            entry.innerHTML = `<span class="log-time">[${timeStr}]</span>${message}`;
            debugConsole.appendChild(entry);
            debugConsole.scrollTop = debugConsole.scrollHeight;
            console.log(`[${type}] ${message}`);
        }

        // Clear console
        clearConsoleBtn.addEventListener('click', () => {
            debugConsole.innerHTML = '';
            log('Console cleared.');
        });

        // Set status UI
        function setStatus(text, type = 'ready') {
            statusText.textContent = text;
            statusIndicator.className = 'status-indicator';
            if (type === 'listening') {
                statusIndicator.classList.add('active');
            } else if (type === 'speaking') {
                statusIndicator.classList.add('speaking');
            }
        }

        // Browser support check
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const SpeechSynthesis = window.speechSynthesis;

        if (!SpeechRecognition) {
            log('エラー: Web Speech API (音声認識) がこのブラウザでサポートされていません。Safariなどを試してください。', 'error');
        }
        if (!SpeechSynthesis) {
            log('エラー: SpeechSynthesis (音声合成) がサポートされていません。', 'error');
        }

        // SpeechSynthesis unlock function
        function unlockTTS() {
            log('音声エンジンの事前アンロックを実行します...');
            const u = new SpeechSynthesisUtterance('');
            u.volume = 0; // 無音
            
            // iOSではこれらを明示的に設定しないと動かないことがある
            u.lang = 'ja-JP';
            
            SpeechSynthesis.speak(u);
            log('事前アンロック用の無音再生コマンドを送信しました。', 'success');
        }

        // Direct Text-to-Speech Test
        directSpeakBtn.addEventListener('click', () => {
            log('即時読み上げテストを開始します。 (非同期通信なしの直接再生)');
            setStatus('テスト再生中...', 'speaking');
            
            const text = '即時読み上げのテストです。音が聞こえていますか？';
            spokenTextDiv.textContent = text;
            spokenTextDiv.classList.remove('placeholder');

            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'ja-JP';

            // iOS向けの音声設定
            const voices = SpeechSynthesis.getVoices();
            const jaVoice = voices.find(v => v.lang.includes('ja-JP'));
            if (jaVoice) {
                utterance.voice = jaVoice;
                log(`音声エンジン選択: ${jaVoice.name}`);
            }

            utterance.onend = () => {
                log('即時読み上げテストが完了しました。', 'success');
                setStatus('準備完了 (Ready)', 'ready');
            };

            utterance.onerror = (e) => {
                log(`読み上げエラーが発生しました: ${e.error}`, 'error');
                setStatus('エラー発生', 'ready');
            };

            SpeechSynthesis.speak(utterance);
        });

        // Manual Unlock Only
        unlockBtn.addEventListener('click', () => {
            unlockTTS();
        });

        // Main Test: Speak -> Delay (simulating network) -> Read Aloud
        if (SpeechRecognition) {
            const recognition = new SpeechRecognition();
            recognition.lang = 'ja-JP';
            recognition.interimResults = false;
            recognition.maxAlternatives = 1;

            let isRecognitionActive = false;

            startBtn.addEventListener('click', () => {
                if (isRecognitionActive) {
                    log('認識はすでに開始されています。');
                    return;
                }

                // iOS 対策用事前アンロックを実行
                if (workaroundToggle.checked) {
                    log('【iOS対策】ボタンクリックと同期的（非同期の前）に無音再生を実行します。');
                    unlockTTS();
                } else {
                    log('【iOS対策なし】アンロック処理をスキップして進めます。(iPhoneでは動作しない可能性が高いです)');
                }

                try {
                    recognition.start();
                } catch (err) {
                    log(`音声認識の起動に失敗: ${err.message}`, 'error');
                }
            });

            recognition.onstart = () => {
                isRecognitionActive = true;
                setStatus('音声を聞き取り中...', 'listening');
                log('音声入力を開始してください。話しかけてください...', 'warning');
                
                recognizedTextDiv.textContent = '話しかけてください...';
                recognizedTextDiv.classList.add('placeholder');
                spokenTextDiv.textContent = 'ここに読み上げるFAQの回答が表示されます...';
                spokenTextDiv.classList.add('placeholder');
            };

            recognition.onerror = (event) => {
                log(`音声認識エラー: ${event.error}`, 'error');
                setStatus('認識エラー', 'ready');
                isRecognitionActive = false;
            };

            recognition.onend = () => {
                isRecognitionActive = false;
                if (statusText.textContent === '音声を聞き取り中...') {
                    setStatus('準備完了 (Ready)', 'ready');
                    log('音声認識が終了しました。何も検出されませんでした。');
                }
            };

            recognition.onresult = async (event) => {
                const text = event.results[0][0].transcript;
                log(`音声認識成功: "${text}"`, 'success');
                
                recognizedTextDiv.textContent = text;
                recognizedTextDiv.classList.remove('placeholder');

                // Simulate network latency (e.g., FAQ search from API)
                setStatus('回答検索中 (2秒待機)...', 'listening');
                log('FAQ回答取得のシミュレート（2秒間の非同期ディレイ）を開始します...');
                
                await new Promise(resolve => setTimeout(resolve, 2000));

                const answerText = `ご質問の「${text}」について回答します。これはFAQの自動音声返答テストです。無事に聞こえていますか？`;
                log(`回答データ取得完了。読み上げを開始します: "${answerText}"`);
                
                spokenTextDiv.textContent = answerText;
                spokenTextDiv.classList.remove('placeholder');

                setStatus('回答読み上げ中...', 'speaking');

                const utterance = new SpeechSynthesisUtterance(answerText);
                utterance.lang = 'ja-JP';

                // Explicit Japanese voice selection
                const voices = SpeechSynthesis.getVoices();
                const jaVoice = voices.find(v => v.lang.includes('ja-JP'));
                if (jaVoice) {
                    utterance.voice = jaVoice;
                }

                utterance.onend = () => {
                    log('読み上げが正常に完了しました。', 'success');
                    setStatus('準備完了 (Ready)', 'ready');
                };

                utterance.onerror = (e) => {
                    log(`読み上げエラーが発生しました: ${e.error}`, 'error');
                    setStatus('読み上げエラー', 'ready');
                };

                SpeechSynthesis.speak(utterance);
            };
        }

        // Try loading voices initially (useful for iOS to register them early)
        if (SpeechSynthesis) {
            SpeechSynthesis.getVoices();
        }
    </script>
</body>
</html>
