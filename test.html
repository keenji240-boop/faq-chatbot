<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>備品予約システム - 認証テスト</title>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Meiryo, sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      padding: 36px 32px;
      width: 100%;
      max-width: 420px;
    }
    h2 {
      color: #1f3864;
      font-size: 1.2rem;
      margin-bottom: 24px;
      text-align: center;
    }

    /* ===== セクション ===== */
    .section {
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 16px;
    }
    .section-title {
      font-size: 0.78rem;
      font-weight: bold;
      color: #2e5fa3;
      margin-bottom: 12px;
      text-transform: uppercase;
    }

    /* ===== ユーザー情報 ===== */
    .user-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }
    .avatar {
      width: 48px; height: 48px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid #2e5fa3;
      display: none;
    }
    .avatar-icon {
      width: 48px; height: 48px;
      border-radius: 50%;
      background: #d9e2f3;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.4rem;
    }
    .user-name  { font-weight: bold; font-size: 0.95rem; }
    .user-email { font-size: 0.85rem; color: #555; margin-top: 2px; }

    /* ===== ボタン ===== */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 9px 18px;
      border-radius: 6px;
      border: none;
      font-size: 0.88rem;
      font-weight: bold;
      cursor: pointer;
    }
    .btn-blue  { background: #2e5fa3; color: #fff; }
    .btn-blue:hover  { background: #1f3864; }
    .btn-red   { background: #b22222; color: #fff; }
    .btn-red:hover   { background: #8b1a1a; }
    .btn-gray  { background: #eee; color: #333; }
    .btn-gray:hover  { background: #ddd; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ===== マイク ===== */
    .mic-status {
      font-size: 0.88rem;
      color: #444;
      margin-bottom: 10px;
      min-height: 20px;
    }
    .mic-buttons { display: flex; gap: 10px; flex-wrap: wrap; }
    .meter-wrap {
      margin-top: 12px;
      display: none;
    }
    .meter-label { font-size: 0.75rem; color: #888; margin-bottom: 4px; }
    .meter-bg {
      background: #f0f2f5;
      border-radius: 4px;
      height: 12px;
      overflow: hidden;
    }
    .meter-bar {
      height: 100%;
      width: 0%;
      background: #2e5fa3;
      transition: width 0.08s;
    }

    /* ===== ログイン前後の切り替え ===== */
    #afterLogin  { display: none; }
    #beforeLogin { display: block; }
  </style>
</head>
<body>
<div class="card">
  <h2>🔐 備品予約システム 認証テスト</h2>

  <!-- ===== Google認証 ===== -->
  <div class="section">
    <div class="section-title">① Googleアカウント</div>

    <!-- ログイン前 -->
    <div id="beforeLogin">
      <div id="g_id_onload"
        data-client_id="826029939967-t2d00f9l7p537gtdi6mqt8hl8kn1gml6.apps.googleusercontent.com"
        data-callback="onGsiCallback"
        data-auto_prompt="false">
      </div>
      <div class="g_id_signin"
        data-type="standard"
        data-shape="rectangular"
        data-theme="outline"
        data-text="signin_with"
        data-size="large"
        data-locale="ja">
      </div>
    </div>

    <!-- ログイン後 -->
    <div id="afterLogin">
      <div class="user-row">
        <div class="avatar-icon" id="avatarIcon">👤</div>
        <img id="avatarImg" class="avatar" src="" alt="">
        <div>
          <div class="user-name"  id="userName">-</div>
          <div class="user-email" id="userEmail">-</div>
        </div>
      </div>
      <button class="btn btn-gray" onclick="signOut()">サインアウト</button>
    </div>
  </div>

  <!-- ===== マイク ===== -->
  <div class="section">
    <div class="section-title">② マイク</div>
    <div class="mic-status" id="micStatus">
      「マイクをテスト」を押してください。
    </div>
    <div class="mic-buttons">
      <button class="btn btn-blue" id="btnStart" onclick="startMic()">
        🎤 マイクをテスト
      </button>
      <button class="btn btn-red" id="btnStop"
              onclick="stopMic()" style="display:none">
        ⏹ 停止
      </button>
    </div>
    <div class="meter-wrap" id="meterWrap">
      <div class="meter-label">入力レベル</div>
      <div class="meter-bg">
        <div class="meter-bar" id="meterBar"></div>
      </div>
    </div>
  </div>

</div><!-- /.card -->

<script>
// ================================================================
// 設定
// ================================================================
var GSI_CLIENT_ID = '826029939967-t2d00f9l7p537gtdi6mqt8hl8kn1gml6.apps.googleusercontent.com';

// ================================================================
// Google Sign-In コールバック
// ================================================================
function onGsiCallback(response) {
  // GoogleのAPIでIDトークンを検証してメアドを取得
  fetch('https://oauth2.googleapis.com/tokeninfo?id_token=' + response.credential)
    .then(function(res) { return res.json(); })
    .then(function(p) {
      // ユーザー情報を表示
      document.getElementById('userName').textContent  = p.name    || '（名前なし）';
      document.getElementById('userEmail').textContent = p.email   || '（メアドなし）';

      // アバター画像
      if (p.picture) {
        var img = document.getElementById('avatarImg');
        img.src = p.picture;
        img.style.display = 'block';
        document.getElementById('avatarIcon').style.display = 'none';
      }

      // ログイン前後の表示切り替え
      document.getElementById('beforeLogin').style.display = 'none';
      document.getElementById('afterLogin').style.display  = 'block';

      console.log('ログイン成功:', p.email);
    })
    .catch(function(err) {
      alert('ログインエラー: ' + err.message);
    });
}

// ================================================================
// サインアウト
// ================================================================
function signOut() {
  google.accounts.id.disableAutoSelect();
  document.getElementById('beforeLogin').style.display = 'block';
  document.getElementById('afterLogin').style.display  = 'none';
  document.getElementById('userName').textContent  = '-';
  document.getElementById('userEmail').textContent = '-';
  document.getElementById('avatarImg').style.display  = 'none';
  document.getElementById('avatarIcon').style.display = 'flex';
  stopMic();
}

// ================================================================
// マイク
// ================================================================
var micStream  = null;
var micContext = null;
var micAnimId  = null;

function startMic() {
  document.getElementById('micStatus').textContent = '許可を確認中...';

  navigator.mediaDevices.getUserMedia({ audio: true, video: false })
    .then(function(stream) {
      micStream = stream;
      document.getElementById('micStatus').textContent = '✅ マイク使用可能';
      document.getElementById('btnStart').style.display = 'none';
      document.getElementById('btnStop').style.display  = 'inline-flex';
      document.getElementById('meterWrap').style.display = 'block';
      startMeter(stream);
    })
    .catch(function(err) {
      if (err.name === 'NotAllowedError') {
        document.getElementById('micStatus').textContent =
          '❌ マイクが拒否されました。ブラウザの設定から許可してください。';
      } else if (err.name === 'NotFoundError') {
        document.getElementById('micStatus').textContent =
          '❌ マイクが見つかりません。接続を確認してください。';
      } else {
        document.getElementById('micStatus').textContent =
          '❌ エラー: ' + err.message;
      }
    });
}

function startMeter(stream) {
  micContext = new (window.AudioContext || window.webkitAudioContext)();
  var source   = micContext.createMediaStreamSource(stream);
  var analyser = micContext.createAnalyser();
  analyser.fftSize = 256;
  source.connect(analyser);
  var data = new Uint8Array(analyser.frequencyBinCount);

  function draw() {
    micAnimId = requestAnimationFrame(draw);
    analyser.getByteFrequencyData(data);
    var avg = data.reduce(function(a,b){ return a+b; }, 0) / data.length;
    document.getElementById('meterBar').style.width =
      Math.min(100, (avg / 128) * 100) + '%';
  }
  draw();
}

function stopMic() {
  if (micAnimId) { cancelAnimationFrame(micAnimId); micAnimId = null; }
  if (micContext) { micContext.close(); micContext = null; }
  if (micStream)  {
    micStream.getTracks().forEach(function(t){ t.stop(); });
    micStream = null;
  }
  document.getElementById('btnStart').style.display  = 'inline-flex';
  document.getElementById('btnStop').style.display   = 'none';
  document.getElementById('meterWrap').style.display = 'none';
  document.getElementById('meterBar').style.width    = '0%';
  document.getElementById('micStatus').textContent   =
    '「マイクをテスト」を押してください。';
}

// ================================================================
// 初期化：マイク対応チェック
// ================================================================
(function() {
  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    document.getElementById('micStatus').textContent =
      '❌ このブラウザはマイクに対応していません。';
    document.getElementById('btnStart').disabled = true;
  }
})();
</script>
</body>
</html>
