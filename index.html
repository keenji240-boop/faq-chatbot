<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>鳥取大学 FAQアシスタント</title>
<script src="https://apis.google.com/js/api.js" async defer></script>
<style>
/* ── CSS変数 ── */
:root{
  --bg:#06060f;--surface:#0a0a16;--surface2:#0f1022;--surface3:#13162a;
  --border:#1e2240;--border2:#2a2d44;
  --accent:#4f8ef7;--accent2:#a78bfa;
  --green:#4a9a4a;--amber:#c89a2a;--cyan:#2a9aaa;--purple:#8a4aaa;--red:#aa4a4a;
  --text:#c8d0f0;--text2:#7b80a0;--text3:#3a4060;
  --radius:14px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Noto Sans JP',sans-serif;font-size:14px}
a{color:var(--accent);text-decoration:none}
a:hover{text-decoration:underline}
button{cursor:pointer;border:none;font-family:inherit;font-size:12px;transition:opacity .15s}
button:hover{opacity:.8}
input,textarea,select{
  background:var(--surface3);color:var(--text);
  border:1px solid var(--border2);border-radius:8px;
  padding:8px 10px;font-family:inherit;font-size:13px;width:100%;
  outline:none;margin-bottom:8px;
}
input:focus,textarea:focus,select:focus{border-color:var(--accent)}
textarea{resize:vertical;min-height:80px}

/* ── アプリ全体レイアウト ── */
#app{
  display:flex;flex-direction:column;height:100vh;
  max-width:100%;background:var(--surface);
}

/* ── Topbar ── */
#topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:8px 14px;background:var(--surface2);
  border-bottom:1px solid var(--border);
  min-height:44px;flex-shrink:0;z-index:100;
}
.topbar-left{display:flex;align-items:center;gap:8px}
.role-badge{
  padding:3px 10px;border-radius:999px;font-size:11px;font-weight:700;
  letter-spacing:.04em;
}
.badge-admin  {background:var(--purple);color:#fff}
.badge-staff  {background:var(--green);color:#fff}
.badge-student{background:var(--accent);color:#fff}
.badge-general{background:var(--surface3);color:var(--text2);border:1px solid var(--border2)}
.mask-email{font-size:10px;color:var(--text2)}
#logoutBtn{
  padding:4px 10px;border-radius:6px;font-size:11px;
  background:transparent;color:var(--text2);
  border:1px solid var(--border2);
}

/* ── PC 2カラム ── */
@media(min-width:1321px){
  #mainLayout{display:flex;flex:1;overflow:hidden}
  #leftCol{display:flex;flex-direction:column;flex:1;overflow:hidden}
  #rightCol{
    width:280px;flex-shrink:0;
    display:flex;flex-direction:column;
    border-left:1px solid var(--border);
    background:var(--surface2);
    padding:12px;gap:12px;overflow-y:auto;
  }
  #chatArea{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:10px}
  #inputArea{padding:10px 12px;border-top:1px solid var(--border);background:var(--surface2);flex-shrink:0}
  #btnArea{display:flex;flex-direction:column;gap:6px}
}

/* ── スマホ 1カラム ── */
@media(max-width:1320px){
  #app{flex-direction:column}
  #mainLayout{display:flex;flex-direction:column;flex:1;overflow:hidden}
  #leftCol{display:flex;flex-direction:column;flex:1;overflow:hidden}
  #rightCol{padding:8px 10px;border-top:1px solid var(--border);background:var(--surface2);flex-shrink:0}
  #chatArea{flex:1;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:8px}
  #inputArea{padding:8px 10px;border-top:1px solid var(--border);background:var(--surface2);flex-shrink:0}
  #btnArea{display:flex;flex-wrap:wrap;gap:5px}
}

/* ── CSSアニメヘッダー ── */
#animHeader{
  width:100%;height:150px;position:relative;flex-shrink:0;overflow:hidden;
}
/* star */
.anim-star{background:#060612}
.anim-star::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 50% 50%,#1a1040 0%,#06060f 80%);
  animation:starPulse 4s ease-in-out infinite;
}
@keyframes starPulse{0%,100%{opacity:.8}50%{opacity:1}}
/* wave */
.anim-wave{background:linear-gradient(135deg,#06060f,#0d1030)}
.anim-wave::after{
  content:'';position:absolute;inset:0;
  background:repeating-linear-gradient(
    90deg,transparent,transparent 60px,rgba(79,142,247,.06) 61px
  );
  animation:waveDrift 8s linear infinite;
}
@keyframes waveDrift{from{transform:translateX(0)}to{transform:translateX(61px)}}
/* gradient */
.anim-gradient{
  background:linear-gradient(135deg,#06060f 0%,#0d1030 40%,#160830 70%,#06060f 100%);
  background-size:400% 400%;
  animation:gradShift 8s ease infinite;
}
@keyframes gradShift{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
/* geo */
.anim-geo{background:#07080f}
.anim-geo::before{
  content:'';position:absolute;inset:0;
  background:repeating-conic-gradient(rgba(79,142,247,.04) 0deg 30deg,transparent 30deg 60deg);
  animation:geoRot 20s linear infinite;
}
@keyframes geoRot{from{transform:rotate(0)}to{transform:rotate(360deg)}}
/* aurora */
.anim-aurora{background:#04060e}
.anim-aurora::before{
  content:'';position:absolute;inset:-50%;
  background:conic-gradient(from 0deg,transparent 60%,rgba(79,142,247,.12) 70%,rgba(167,139,250,.1) 80%,transparent 90%);
  animation:auroraRot 12s linear infinite;
}
@keyframes auroraRot{from{transform:rotate(0)}to{transform:rotate(360deg)}}
/* particle */
.anim-particle{background:radial-gradient(ellipse at center,#0d1030 0%,#06060f 100%)}

/* マスコット表示エリア（アイコン画像差し替え用） */
#mascotWrap{
  position:absolute;top:50%;right:20px;transform:translateY(-50%);
  width:80px;height:80px;display:flex;align-items:center;justify-content:center;
  font-size:56px;filter:drop-shadow(0 0 12px rgba(79,142,247,.4));
  animation:mascotFloat 3s ease-in-out infinite;
}
@keyframes mascotFloat{0%,100%{transform:translateY(-50%)}50%{transform:translateY(calc(-50% - 6px))}}

/* ── 音声状態インジケーター ── */
#voiceStatus{
  position:absolute;bottom:8px;left:10px;z-index:20;
  display:flex;align-items:center;gap:5px;pointer-events:none;
}
.vs-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.vs-label{font-size:9px;font-family:monospace;letter-spacing:.04em}
.vs-off .vs-dot{background:var(--text3)}
.vs-off .vs-label{color:var(--text3)}
.vs-wake .vs-dot{background:#c8a020;box-shadow:0 0 6px #c8a02088;animation:vsPulse 2s ease-in-out infinite}
.vs-wake .vs-label{color:#c8a020}
.vs-listen .vs-dot{background:#e84040;box-shadow:0 0 8px #e84040cc;animation:vsPulse .5s ease-in-out infinite}
.vs-listen .vs-label{color:#e84040}
.vs-speak .vs-dot{background:#4080e8;box-shadow:0 0 8px #4080e8cc;animation:vsPulse .7s ease-in-out infinite}
.vs-speak .vs-label{color:#4080e8}
@keyframes vsPulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.4);opacity:.6}}

/* ── チャットエリア ── */
.msg-row{display:flex;align-items:flex-start;gap:8px;width:100%}
.msg-row.user{flex-direction:row-reverse}
.msg-icon img,.msg-icon-placeholder{width:32px;height:32px;border-radius:50%;flex-shrink:0;object-fit:cover;background:var(--surface3)}
.msg-bubble{
  max-width:78%;padding:10px 13px;border-radius:var(--radius);
  font-size:13px;line-height:1.6;word-break:break-word;
}
.msg-bot   .msg-bubble{background:var(--surface3);border:1px solid var(--border2);border-top-left-radius:4px}
.msg-user  .msg-bubble{background:var(--accent);color:#fff;border-top-right-radius:4px}
.msg-system .msg-bubble{background:var(--surface2);border:1px solid var(--border);color:var(--text2);font-size:12px;border-top-left-radius:4px}
.msg-error  .msg-bubble{background:rgba(170,74,74,.15);border:1px solid var(--red);color:#e08080;font-size:12px;border-top-left-radius:4px}
.msg-loading .msg-bubble{background:var(--surface3);border:1px solid var(--border2)}
.loading-dots span{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--text2);margin:0 2px;animation:ldot .9s ease-in-out infinite}
.loading-dots span:nth-child(2){animation-delay:.15s}
.loading-dots span:nth-child(3){animation-delay:.3s}
@keyframes ldot{0%,80%,100%{transform:scale(0);opacity:.5}40%{transform:scale(1);opacity:1}}

/* URL リンク */
.msg-urls{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px}
.msg-url-btn{
  padding:4px 10px;border-radius:6px;font-size:11px;
  background:var(--surface2);border:1px solid var(--border2);
  color:var(--accent);cursor:pointer;
}
.msg-url-btn:hover{border-color:var(--accent)}

/* インラインフォーム */
.msg-form{
  background:var(--surface2);border:1px solid var(--border2);
  border-radius:var(--radius);padding:14px;width:100%;
  display:flex;flex-direction:column;gap:6px;
}
.msg-form h4{font-size:13px;color:var(--text);margin-bottom:4px}
.msg-form label{font-size:11px;color:var(--text2);margin-bottom:2px;display:block}
.form-error{color:#e08080;font-size:11px;margin-top:2px}
.form-btns{display:flex;gap:6px;margin-top:6px}

/* ── ボタン ── */
.btn{
  padding:7px 12px;border-radius:8px;font-size:12px;font-weight:600;
  letter-spacing:.03em;border:none;color:#fff;cursor:pointer;
  white-space:nowrap;
}
.btn-primary{background:var(--accent)}
.btn-green  {background:var(--green)}
.btn-amber  {background:var(--amber)}
.btn-cyan   {background:var(--cyan)}
.btn-purple {background:var(--purple)}
.btn-red    {background:var(--red)}
.btn-ghost  {background:transparent;border:1px solid var(--border2);color:var(--text2)}
.btn-sm     {padding:4px 9px;font-size:11px;border-radius:6px}
.btn-row    {display:flex;flex-wrap:wrap;gap:5px}

/* ── 入力エリア ── */
#inputWrap{display:flex;gap:6px;align-items:flex-end}
#inputText{
  flex:1;background:var(--surface3);color:var(--text);
  border:1px solid var(--border2);border-radius:10px;
  padding:9px 12px;font-size:13px;font-family:inherit;
  resize:none;min-height:40px;max-height:120px;
  outline:none;margin:0;
}
#inputText:focus{border-color:var(--accent)}
#micBtn,#sendBtn{
  width:38px;height:38px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:16px;border:none;
}
#micBtn{background:var(--surface3);border:1px solid var(--border2);color:var(--text2)}
#micBtn.listening{background:rgba(232,64,64,.2);border-color:var(--red);color:var(--red)}
#sendBtn{background:var(--accent);color:#fff}

/* ── モーダル ── */
#modalOverlay{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);
  z-index:300;align-items:center;justify-content:center;padding:20px;
}
#modalOverlay.open{display:flex}
#modalCard{
  background:var(--surface2);border:1px solid var(--border2);
  border-radius:20px;padding:22px 20px;width:100%;max-width:420px;
  max-height:90vh;overflow-y:auto;display:flex;flex-direction:column;gap:8px;
}
#modalTitle{font-size:14px;font-weight:700;color:var(--text);margin-bottom:4px}
#modalBody{display:flex;flex-direction:column;gap:4px}
#modalBtns{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.modal-label{font-size:11px;color:var(--text2);margin-bottom:2px;display:block}
.modal-readonly{font-size:12px;color:var(--text);padding:6px 0;border-bottom:1px solid var(--border);margin-bottom:6px}

/* ── リスト表示 ── */
.list-card{
  background:var(--surface3);border:1px solid var(--border);
  border-radius:10px;padding:10px 12px;display:flex;flex-direction:column;gap:4px;
}
.list-card-header{display:flex;justify-content:space-between;align-items:center}
.list-no{font-size:11px;color:var(--text3)}
.list-status{font-size:10px;padding:2px 7px;border-radius:999px}
.status-未回答{background:rgba(200,154,42,.2);color:var(--amber)}
.status-回答中{background:rgba(42,154,170,.2);color:var(--cyan)}
.status-回答済{background:rgba(74,154,74,.2);color:var(--green)}
.list-q{font-size:12px;color:var(--text);line-height:1.5}
.list-meta{font-size:10px;color:var(--text2)}
</style>
</head>
<body>
<div id="app">
  <!-- Topbar -->
  <div id="topbar">
    <div class="topbar-left">
      <span class="role-badge badge-general" id="roleBadge">一般</span>
      <span class="mask-email" id="maskEmail"></span>
    </div>
    <div style="display:flex;gap:6px;align-items:center">
      <button class="btn btn-primary btn-sm" id="loginBtn" style="display:none" onclick="C_signIn()">🔑 ログイン</button>
      <button class="btn btn-ghost btn-sm" id="logoutBtn" style="display:none" onclick="C_logout()">ログアウト</button>
    </div>
  </div>

  <!-- メインレイアウト -->
  <div id="mainLayout">
    <div id="leftCol">
      <!-- CSSアニメヘッダー -->
      <div id="animHeader">
        <div id="mascotWrap">🦉</div>
        <div class="voice-status vs-off" id="voiceStatus">
          <div class="vs-dot"></div>
          <span class="vs-label" id="vsLabel">音声オフ</span>
        </div>
      </div>
      <!-- チャットエリア -->
      <div id="chatArea"></div>
      <!-- 入力エリア（スマホ時はここ、PCは右カラムから） -->
      <div id="inputArea" class="pc-hide-input">
        <div id="inputWrap">
          <textarea id="inputText" placeholder="質問を入力してください…" rows="1"
            onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();C_sendMessage()}"
            oninput="this.style.height='auto';this.style.height=Math.min(this.scrollHeight,120)+'px'"></textarea>
          <button id="micBtn" onclick="C_toggleMic()" title="マイク">🎙</button>
          <button id="sendBtn" onclick="C_sendMessage()" title="送信">➤</button>
        </div>
      </div>
    </div>

    <!-- 右カラム（PCのみ） -->
    <div id="rightCol">
      <div id="btnArea"></div>
      <!-- PC用入力エリア -->
      <div id="inputAreaPC">
        <div id="inputWrapPC">
          <textarea id="inputTextPC" placeholder="質問を入力してください…" rows="2"
            onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();C_sendMessage()}"
            oninput="this.style.height='auto';this.style.height=Math.min(this.scrollHeight,120)+'px'"></textarea>
          <div style="display:flex;gap:6px;margin-top:6px">
            <button id="micBtnPC" class="btn btn-ghost" style="flex:1" onclick="C_toggleMic()">🎙 マイク</button>
            <button class="btn btn-primary" style="flex:1" onclick="C_sendMessage()">➤ 送信</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- モーダル -->
<div id="modalOverlay">
  <div id="modalCard">
    <div id="modalTitle"></div>
    <div id="modalBody"></div>
    <div id="modalBtns"></div>
  </div>
</div>

<script>
// ============================================================
//  定数・状態変数
// ============================================================
const GAS_URL    = 'https://script.google.com/macros/s/AKfycbwxHCEMnTELSIOmmiZLc2q37ugzy9j3cT6jxWXumvXAci2UVcaQWnmmCnzDZpjOeL_gNA/exec';
const GSI_CLIENT_ID = 'YOUR_GSI_CLIENT_ID'; // Google Cloud コンソールのOAuth 2.0クライアントIDを入力

let userEmail      = '';
let userRole       = 'general';
let micPermGranted = false;
let isMicOn        = false;
let isSpeaking     = false;
let wakeRecog      = null;
let recognition    = null;
let lastBotMsg     = '';
let SETTINGS       = {};
let COMMANDS       = [];

const ANIM_PATTERNS = ['star','wave','gradient','geo','aurora','particle'];

// ============================================================
//  ページロード
// ============================================================
window.addEventListener('load', () => {
  // CSSアニメランダム選択
  const idx = Math.floor(Math.random() * ANIM_PATTERNS.length);
  document.getElementById('animHeader').classList.add('anim-' + ANIM_PATTERNS[idx]);

  C_addMsg('system', 'ログイン中…', true);

  // PC/スマホ入力エリア制御
  C_adjustLayout();
  window.addEventListener('resize', C_adjustLayout);

  // Google API Client 初期化（polling で待機・最大5秒）
  let _gapiPollCount = 0;
  const _gapiTimer = setTimeout(C_onGsiTimeout, 5000);
  const _gapiPoll = setInterval(() => {
    _gapiPollCount++;
    if (window.gapi) {
      clearInterval(_gapiPoll);
      gapi.load('auth2', () => {
        gapi.auth2.init({ client_id: GSI_CLIENT_ID }).then(() => {
          clearTimeout(_gapiTimer);
          C_checkSignIn();
        }).catch(e => {
          clearTimeout(_gapiTimer);
          C_addMsg('error', 'Google認証初期化エラー: ' + e.error);
          C_onGsiTimeout();
        });
      });
    } else if (_gapiPollCount > 50) {
      clearInterval(_gapiPoll);
    }
  }, 100);
});

function C_adjustLayout() {
  const isPC = window.innerWidth > 1320;
  document.getElementById('inputArea').style.display   = isPC ? 'none' : 'block';
  document.getElementById('inputAreaPC').style.display = isPC ? 'block' : 'none';
}

// ============================================================
//  Google OAuth2認証
// ============================================================

// サインイン状態チェック（ページロード時）
function C_checkSignIn() {
  const auth2 = gapi.auth2.getAuthInstance();
  if (auth2.isSignedIn.get()) {
    // 既存セッションあり
    const user  = auth2.currentUser.get();
    userEmail   = user.getBasicProfile().getEmail();
    C_onSignedIn();
  } else {
    // 未サインイン → 一般ロールで起動しサインインボタンを表示
    C_onGsiTimeout();
  }
}

// サインインボタン押下
function C_signIn() {
  const auth2 = gapi.auth2.getAuthInstance();
  auth2.signIn({ prompt: 'select_account' }).then(() => {
    const user = auth2.currentUser.get();
    userEmail  = user.getBasicProfile().getEmail();
    C_onSignedIn();
  }).catch(e => {
    if (e.error !== 'popup_closed_by_user') {
      C_addMsg('error', 'ログインエラー: ' + (e.error || e.message || JSON.stringify(e)));
    }
  });
}

// サインイン成功時の処理
function C_onSignedIn() {
  C_gasCall({ action:'getUser', email:userEmail }, (res) => {
    userRole = res.role || 'general';
    C_renderTopbar(res);
    // ログイン中メッセージを置き換え
    const loading = document.querySelector('.msg-loading');
    if (loading) loading.closest('.msg-row') && loading.closest('.msg-row').remove();
    C_addMsg('system', (res.displayRole || '一般') + 'としてログインしました。');
    C_startApp();
  });
}

function C_onGsiTimeout() {
  userEmail = '';
  userRole  = 'general';
  C_renderTopbar({ role:'general', maskedEmail:'', displayRole:'一般' });
  C_startApp();
}

// ============================================================
//  Topbar描画
// ============================================================
function C_renderTopbar(info) {
  const badge = document.getElementById('roleBadge');
  const clsMap = { admin:'badge-admin', staff:'badge-staff', student:'badge-student', general:'badge-general' };
  badge.textContent = info.displayRole || '一般';
  badge.className   = 'role-badge ' + (clsMap[info.role] || 'badge-general');
  document.getElementById('maskEmail').textContent = info.maskedEmail || '';
  document.getElementById('logoutBtn').style.display = info.role !== 'general' ? 'block' : 'none';
  document.getElementById('loginBtn').style.display  = info.role === 'general' ? 'block' : 'none';
}

function C_logout() {
  if (window.gapi && gapi.auth2) {
    const auth2 = gapi.auth2.getAuthInstance();
    auth2.signOut().then(() => location.reload());
  } else {
    location.reload();
  }
}

// ============================================================
//  アプリ起動
// ============================================================
function C_startApp() {
  // ローディングメッセージ削除
  const loading = document.querySelector('.msg-loading');
  if (loading) loading.closest('.msg-row') && loading.closest('.msg-row').remove() || loading.remove();

  const loginMsg = userEmail
    ? (document.querySelector('.msg-system:last-child') ? null : true)
    : null;
  C_addMsg('system', userEmail
    ? '教職員としてログインしました。'
    : 'ログインせずに利用します。');

  // コマンド取得
  C_gasCall({ action:'getCommands', role:userRole }, (res) => {
    if (res.success) {
      COMMANDS = res.commands || [];
      C_renderButtons();
    }
    // ログ
    C_gasCall({ action:'writeLog', email:userEmail, role:userRole, logAction:'LOGIN', detail:'', result:'成功' });
    // ウェルカム
    C_addMsg('bot', '何かご質問はありますか？');
    C_speak('何かご質問はありますか？');
    // マイク許可
    C_showMicPermDialog();
  });
}

// ============================================================
//  ボタン描画（ロール別）
// ============================================================
function C_renderButtons() {
  const area = document.getElementById('btnArea');
  area.innerHTML = '';
  const roleLevel = { general:0, student:1, staff:2, admin:3 };
  const myLevel   = roleLevel[userRole] || 0;

  // 質問するボタン（全ロール）
  const row0 = document.createElement('div');
  row0.className = 'btn-row';
  const qBtn = document.createElement('button');
  qBtn.className = 'btn btn-primary';
  qBtn.textContent = '💬 質問する';
  qBtn.onclick = () => {

// ============================================================
//  ウェイクワードリスナー
// ============================================================
const WAKE_VARIANTS = ['ねえフクロウ','ねえ、フクロウ','ねぇフクロウ','ねぇ、フクロウ','hey fukurou'];

function C_startWakeListener() {
  if (!micPermGranted || isMicOn || isSpeaking) return;
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) return;
  wakeRecog = new SR();
  wakeRecog.lang = 'ja-JP'; wakeRecog.continuous = true; wakeRecog.interimResults = false;
  wakeRecog.onstart = () => C_setVoiceStatus('wake');
  wakeRecog.onresult = (e) => {
    const t = e.results[e.results.length-1][0].transcript.trim().replace(/\s/g,'');
    if (WAKE_VARIANTS.some(w => t.includes(w.replace(/\s/g,'')))) {
      wakeRecog.stop();
      C_speak('はい、どうぞ。');
      setTimeout(C_startCommandListener, 1200);
    }
  };
  wakeRecog.onend = () => { if (micPermGranted && !isMicOn && !isSpeaking) setTimeout(C_startWakeListener, 500); };
  wakeRecog.onerror = (e) => {
    // 'aborted' は stop() による正常終了なので無視
    if (e.error === 'aborted' || e.error === 'no-speech') return;
    C_setVoiceStatus('off');
    C_addMsg('error', '音声認識エラー: ' + e.error);
  };
  try { wakeRecog.start(); } catch(e) {}
}

function C_startCommandListener() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) return;
  recognition = new SR();
  recognition.lang = 'ja-JP'; recognition.continuous = false; recognition.maxAlternatives = 3;
  recognition.onstart = () => C_setVoiceStatus('listen');
  recognition.onresult = (e) => {
    const candidates = Array.from(e.results[0]).map(r => r.transcript.trim());
    let handled = false;
    for (const t of candidates) { if (C_detectCommand(t)) { handled = true; break; } }
    if (!handled) {
      const el = window.innerWidth > 1320 ? document.getElementById('inputTextPC') : document.getElementById('inputText');
      el.value = candidates[0];
      C_sendMessage();
    }
  };
  recognition.onend = () => { if (micPermGranted && !isMicOn) C_startWakeListener(); };
  recognition.onerror = (e) => {
    if (e.error === 'aborted' || e.error === 'no-speech') {
      if (micPermGranted && !isMicOn) setTimeout(C_startWakeListener, 500);
      return;
    }
    C_setVoiceStatus('off');
    C_addMsg('error', '音声認識エラー: ' + e.error);
    if (micPermGranted) setTimeout(C_startWakeListener, 500);
  };
  try { recognition.start(); } catch(e) {}
}

function C_toggleMic() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { C_addMsg('error','音声入力はChromeでご利用ください。'); return; }
  if (!micPermGranted) { C_showMicPermDialog(); return; }
  const micBtns = [document.getElementById('micBtn'), document.getElementById('micBtnPC')];
  if (isMicOn) {
    isMicOn = false;
    if (recognition) try { recognition.stop(); } catch(e) {}
    micBtns.forEach(b => b && b.classList.remove('listening'));
    C_startWakeListener();
    return;
  }
  isMicOn = true;
  micBtns.forEach(b => b && b.classList.add('listening'));
  if (wakeRecog) try { wakeRecog.stop(); } catch(e) {}
  recognition = new SR();
  recognition.lang = 'ja-JP'; recognition.continuous = false; recognition.interimResults = false;
  recognition.onstart = () => C_setVoiceStatus('listen');
  recognition.onresult = (e) => {
    const t = e.results[0][0].transcript.trim();
    if (!C_detectCommand(t)) {
      const el = window.innerWidth > 1320 ? document.getElementById('inputTextPC') : document.getElementById('inputText');
      el.value = t;
    }
  };
  recognition.onend = () => {
    isMicOn = false;
    micBtns.forEach(b => b && b.classList.remove('listening'));
    if (micPermGranted) C_startWakeListener(); else C_setVoiceStatus('off');
  };
  recognition.onerror = (e) => {
    isMicOn = false;
    micBtns.forEach(b => b && b.classList.remove('listening'));
    if (e.error === 'aborted' || e.error === 'no-speech') {
      if (micPermGranted) C_startWakeListener();
      return;
    }
    C_setVoiceStatus('off');
    C_addMsg('error', '音声認識エラー: ' + e.error);
  };
  try { recognition.start(); } catch(e) { isMicOn = false; micBtns.forEach(b => b && b.classList.remove('listening')); }
}

// ============================================================
//  音声コマンド検出
// ============================================================
const ROLE_LEVEL = { general:0, student:1, staff:2, admin:3 };

function C_detectCommand(text) {
  const t = text.replace(/\s/g,'');
  // 固定コマンド（全ロール）
  if (/送信して|送って/.test(t)) { C_sendMessage(); return true; }
  if (/もう一度|繰り返して/.test(t)) { C_speak(lastBotMsg); return true; }
  if (/止めて|ストップ/.test(t)) { C_stopSpeak(); return true; }
  if (/消して|クリア/.test(t)) {
    document.getElementById('inputText').value = '';
    document.getElementById('inputTextPC').value = '';
    return true;
  }
  // コマンド管理シートから
  const myLevel = ROLE_LEVEL[userRole] || 0;
  const matched = COMMANDS
    .filter(cmd => (cmd.keywords || []).every(kw => t.includes(kw)))
    .sort((a,b) => a.command_id.localeCompare(b.command_id))[0];
  if (!matched) return false;
  if ((ROLE_LEVEL[matched.required_role] || 0) > myLevel) {
    C_speak('質問してください。');
    C_addMsg('system','質問してください。');
    return true;
  }
  if (window[matched.destination]) window[matched.destination]();
  return true;
}

// ============================================================
//  TTS
// ============================================================
// ユーザー操作フラグ（Chrome Autoplay Policy 対策）
let _userInteracted = false;
document.addEventListener('click',    () => { _userInteracted = true; }, { once: false, passive: true });
document.addEventListener('keydown',  () => { _userInteracted = true; }, { once: false, passive: true });
document.addEventListener('touchend', () => { _userInteracted = true; }, { once: false, passive: true });

// TTSキュー（操作前に呼ばれた場合はキューに積んで操作後に再生）
let _ttsQueue = [];
let _ttsReady = false;

function C_speak(text) {
  if (!text || !window.speechSynthesis) return;
  if (!_userInteracted) {
    // ユーザー操作前はキューに積む
    _ttsQueue.push(text);
    return;
  }
  _doSpeak(text);
}

function _doSpeak(text) {
  if (!text || !window.speechSynthesis) return;
  speechSynthesis.cancel();
  setTimeout(() => {
    const utt = new SpeechSynthesisUtterance(text);
    utt.lang  = SETTINGS.TTS_LANG || 'ja-JP';
    utt.rate  = parseFloat(SETTINGS.TTS_RATE || '1.0');
    // Chrome バグ対策：voiceschanged 後に再取得
    const voices = speechSynthesis.getVoices();
    const ja = voices.find(v => v.lang === 'ja-JP') || voices.find(v => v.lang.startsWith('ja'));
    if (ja) utt.voice = ja;
    utt.onstart = () => {
      isSpeaking = true;
      C_setVoiceStatus('speak');
      if (recognition) try { recognition.abort(); } catch(e) {}
    };
    utt.onend = () => {
      isSpeaking = false;
      // キューに残りがあれば続けて再生
      if (_ttsQueue.length > 0) {
        const next = _ttsQueue.shift();
        setTimeout(() => _doSpeak(next), 100);
        return;
      }
      if (micPermGranted && !isMicOn) C_startWakeListener();
      else C_setVoiceStatus('off');
    };
    utt.onerror = (e) => {
      isSpeaking = false;
      C_setVoiceStatus('off');
      // interrupted は正常停止なので無視
      if (e.error !== 'interrupted') console.warn('TTS error:', e.error);
    };
    speechSynthesis.speak(utt);
  }, 150);
}

// ユーザー操作発生時にキュー再生
document.addEventListener('click', () => {
  if (!_ttsReady && _ttsQueue.length > 0) {
    _ttsReady = true;
    const next = _ttsQueue.shift();
    setTimeout(() => _doSpeak(next), 200);
  }
}, { passive: true });
function C_stopSpeak() {
  speechSynthesis.cancel(); isSpeaking = false;
  if (micPermGranted && !isMicOn) C_startWakeListener(); else C_setVoiceStatus('off');
}
if (window.speechSynthesis) speechSynthesis.onvoiceschanged = () => speechSynthesis.getVoices();
document.addEventListener('visibilitychange', () => {
  if (!document.hidden && micPermGranted && !isMicOn && !isSpeaking) C_startWakeListener();
});

// ============================================================
//  チャット送信
// ============================================================
function C_sendMessage() {
  const isPC = window.innerWidth > 1320;
  const el   = isPC ? document.getElementById('inputTextPC') : document.getElementById('inputText');
  const text = el.value.trim();
  if (!text) { C_addMsg('error','質問を入力してください。'); return; }
  el.value = ''; el.style.height = 'auto';
  C_addMsg('user', text);
  const loadRow = C_addMsg('loading', '', true);
  C_gasCall({ action:'chat', email:userEmail, role:userRole, text }, (res) => {
    loadRow.remove();
    C_addMsg('system', '[DEBUG chat] ' + JSON.stringify(res).slice(0,150));
    if (!res.success) { C_addMsg('error', res.message || 'エラーが発生しました。'); return; }
    switch(res.type) {
      case 'faq':
        C_addMsgWithUrls(res.answer, res.urls);
        C_speak(res.answer + (res.urls && res.urls.length ? '　画面のリンク先を確認してください。' : ''));
        lastBotMsg = res.answer;
        break;
      case 'chat':
        C_addMsg('bot', res.answer);
        C_speak(res.answer);
        lastBotMsg = res.answer;
        break;
      case 'unresolved':
        C_addMsg('bot', res.answer);
        C_speak('担当者に確認します。受付番号は' + res.receiptNo + '番です。');
        lastBotMsg = res.answer;
        break;
      default:
        C_addMsg('error', res.answer || res.message || 'エラーが発生しました。');
    }
  });
}

// ============================================================
//  GAS通信共通
// ============================================================
function C_gasCall(params, callback) {
  // GAS Web App は JSON POST を直接受け付けないため
  // payload を JSON文字列にしてフォームデータとして送信する
  const formData = new FormData();
  formData.append('payload', JSON.stringify(params));

  fetch(GAS_URL, {
    method: 'POST',
    body: formData,
    redirect: 'follow'
  })
  .then(r => r.text())
  .then(text => {
    try {
      const data = JSON.parse(text);
      callback && callback(data);
    } catch(e) {
      C_addMsg('error','サーバーからの応答を解析できませんでした。');
      console.error('GAS parse error:', text);
    }
  })
  .catch(e => {
    C_addMsg('error','サーバーとの通信でエラーが発生しました。しばらく待ってからもう一度お試しください。');
    console.error('GAS Error:', e);
  });
}

        <div class="list-meta">${C_esc(faq.category)} ／ ${C_esc(faq.targetAudience)}</div>
        <div style="margin-top:6px">
          <button class="btn btn-purple btn-sm" onclick="openFaqEdit('${C_esc(faq.faqId)}')">編集</button>
        </div>`;
      wrap.appendChild(card);
    });
    chat.appendChild(wrap);
    chat.scrollTop = chat.scrollHeight;
  });
}

// ============================================================
//  FAQ追加
// ============================================================
function openFaqAdd() {
  C_showModal('FAQを追加する', C_faqFormHTML(null), C_faqFormButtons(null));
}

// ============================================================
//  FAQ編集
// ============================================================
function openFaqEdit(faqId) {
  if (!faqId) { openFaqView(); return; }
  C_gasCall({ action:'fetchFaq', email:userEmail }, (res) => {
    if (!res.success) { C_addMsg('error', res.message); return; }
    const faq = res.data.find(f => f.faqId === faqId);
    C_showModal('FAQを編集する（' + faqId + '）', C_faqFormHTML(faq), C_faqFormButtons(faq));
  });
}

function C_faqFormHTML(faq) {
  const v = (key) => faq ? C_esc(faq[key] || '') : '';
  return `
    <label class="modal-label">系統/カテゴリ <span style="color:var(--red)">*</span></label>
    <input type="text" id="faqCat" value="${v('category')}" placeholder="例: 学務・施設・課外活動">
    <label class="modal-label">質問 <span style="color:var(--red)">*</span></label>
    <input type="text" id="faqQ" value="${v('question')}" placeholder="ユーザーが実際に聞く形の文章">
    <label class="modal-label">回答 <span style="color:var(--red)">*</span></label>
    <textarea id="faqA" rows="4">${v('answer')}</textarea>
    <label class="modal-label">キーワード（カンマ区切り・任意）</label>
    <input type="text" id="faqKw" value="${v('keywords')}" placeholder="例: 履修,登録,単位">
    <label class="modal-label">想定質問バリエーション（任意）</label>
    <textarea id="faqVar" rows="2">${v('variations')}</textarea>
    <label class="modal-label">出典URL（任意）</label>
    <input type="text" id="faqUrl" value="${v('sourceUrl')}" placeholder="https://...">
    <label class="modal-label">公開対象者 <span style="color:var(--red)">*</span></label>
    <select id="faqTarget">
      ${['全員','学生のみ','学生＋教職員','教職員のみ'].map(o =>
        `<option${v('targetAudience')===o?' selected':''}>${o}</option>`).join('')}
    </select>
    <label class="modal-label">利用可否 <span style="color:var(--red)">*</span></label>
    <select id="faqAvail">
      ${(faq ? ['使用中','非公開','廃止'] : ['使用中','非公開']).map(o =>
        `<option${v('availability')===o?' selected':''}>${o}</option>`).join('')}
    </select>
    <div class="form-error" id="faqErr"></div>`;
}

function C_faqFormButtons(faq) {
  return [
    { label: faq ? '更新する' : '登録する', cls:'btn-purple', fn: () => {
      const q   = document.getElementById('faqQ').value.trim();
      const a   = document.getElementById('faqA').value.trim();
      const cat = document.getElementById('faqCat').value.trim();
      if (!q || !a || !cat) {
        document.getElementById('faqErr').textContent = '必須項目（カテゴリ・質問・回答）を入力してください。';
        return;
      }
      const params = {
        action: faq ? 'editFaq' : 'addFaq',
        email: userEmail,
        faqId: faq ? faq.faqId : undefined,
        category:       cat,
        question:       q,
        answer:         a,
        keywords:       document.getElementById('faqKw').value.trim(),
        variations:     document.getElementById('faqVar').value.trim(),
        sourceUrl:      document.getElementById('faqUrl').value.trim(),
        targetAudience: document.getElementById('faqTarget').value,
        availability:   document.getElementById('faqAvail').value
      };
      C_gasCall(params, (res) => {
        C_closeModal();
        C_addMsg(res.success ? 'system' : 'error', res.message + (res.faqId ? '（' + res.faqId + '）' : ''));
        if (res.success) C_speak(res.message);
      });
    }},
    { label:'キャンセル', cls:'btn-ghost', fn: C_closeModal }
  ];
}

// ============================================================
//  管理者機能（スタブ）
// ============================================================
function openWebSearch() { C_addMsg('system','個別Webサーチは今後実装予定です。'); }
function runCrawl()      { C_addMsg('system','階層Webサーチは今後実装予定です。'); }
function openLogs()      { C_addMsg('system','利用者ログは今後実装予定です。'); }

// ============================================================
//  ユーティリティ
// ============================================================
function C_esc(str) {
  return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
</script>
