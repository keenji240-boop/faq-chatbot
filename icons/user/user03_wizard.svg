<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 56 56">
  <defs>
    <radialGradient id="u3bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#100818"/>
      <stop offset="100%" stop-color="#060309"/>
    </radialGradient>
    <filter id="u3glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <circle cx="28" cy="28" r="27" fill="url(#u3bg)" stroke="#aa66ff" stroke-width="1.2"/>
  <!-- 魔法使い帽子 -->
  <polygon points="28,4 38,22 18,22" fill="#1a0a30" stroke="#aa66ff" stroke-width="1"/>
  <!-- 帽子の星 -->
  <circle cx="28" cy="12" r="1.5" fill="#ffcc00" filter="url(#u3glow)"/>
  <circle cx="24" cy="17" r="1" fill="#aa66ff" opacity="0.8"/>
  <circle cx="32" cy="16" r="1" fill="#aa66ff" opacity="0.8"/>
  <!-- 帽子のつば -->
  <ellipse cx="28" cy="22" rx="14" ry="3" fill="#1a0a30" stroke="#aa66ff" stroke-width="0.9"/>
  <!-- 顔 -->
  <ellipse cx="28" cy="31" rx="11" ry="11" fill="#180a28" stroke="#aa66ff" stroke-width="1"/>
  <!-- ひげ（白い老魔法使い） -->
  <ellipse cx="28" cy="37" rx="7" ry="4" fill="#e8e0f0" opacity="0.9"/>
  <!-- 目 -->
  <ellipse cx="23" cy="29" rx="3" ry="3" fill="#0a0215" stroke="#cc88ff" stroke-width="0.8"/>
  <ellipse cx="33" cy="29" rx="3" ry="3" fill="#0a0215" stroke="#cc88ff" stroke-width="0.8"/>
  <ellipse cx="23" cy="29" rx="1.8" ry="1.8" fill="#cc88ff" filter="url(#u3glow)"/>
  <ellipse cx="33" cy="29" rx="1.8" ry="1.8" fill="#cc88ff" filter="url(#u3glow)"/>
  <!-- 眉 -->
  <path d="M20 26 Q23 24 26 26" stroke="#e8e0f0" stroke-width="1" fill="none"/>
  <path d="M30 26 Q33 24 36 26" stroke="#e8e0f0" stroke-width="1" fill="none"/>
  <!-- 魔法パーティクル -->
  <circle cx="14" cy="30" r="1.2" fill="#ffcc00" filter="url(u3glow)" opacity="0.8"/>
  <circle cx="42" cy="28" r="1" fill="#aa66ff" filter="url(u3glow)" opacity="0.8"/>
  <circle cx="16" cy="40" r="0.8" fill="#cc88ff" opacity="0.6"/>
  <circle cx="40" cy="38" r="0.8" fill="#ffcc00" opacity="0.6"/>
</svg>
