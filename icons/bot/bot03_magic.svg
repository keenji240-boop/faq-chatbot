<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 56 56">
  <defs>
    <radialGradient id="b3bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#12052a"/>
      <stop offset="100%" stop-color="#06010f"/>
    </radialGradient>
    <filter id="b3glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <circle cx="28" cy="28" r="27" fill="url(#b3bg)" stroke="#9b59ff" stroke-width="1.2"/>
  <!-- 外円 -->
  <circle cx="28" cy="28" r="22" fill="none" stroke="#9b59ff" stroke-width="0.8" opacity="0.6"/>
  <!-- 六芒星 -->
  <polygon points="28,8 33.5,18 44,18 36.5,25 40,36 28,30 16,36 19.5,25 12,18 22.5,18" fill="none" stroke="#d4a0ff" stroke-width="0.9" opacity="0.7" filter="url(#b3glow)"/>
  <!-- 内円 -->
  <circle cx="28" cy="28" r="10" fill="#0e0320" stroke="#b87aff" stroke-width="1" filter="url(#b3glow)"/>
  <!-- 中央の目 -->
  <ellipse cx="28" cy="28" rx="6" ry="4" fill="none" stroke="#e0c0ff" stroke-width="0.9"/>
  <circle cx="28" cy="28" r="2.5" fill="#b87aff" filter="url(#b3glow)"/>
  <circle cx="28" cy="28" r="1" fill="#ffffff"/>
  <!-- ルーン点 -->
  <circle cx="28" cy="6" r="1.5" fill="#d4a0ff" filter="url(#b3glow)"/>
  <circle cx="44" cy="17" r="1.5" fill="#d4a0ff" filter="url(#b3glow)"/>
  <circle cx="44" cy="39" r="1.5" fill="#d4a0ff" filter="url(#b3glow)"/>
  <circle cx="28" cy="50" r="1.5" fill="#d4a0ff" filter="url(#b3glow)"/>
  <circle cx="12" cy="39" r="1.5" fill="#d4a0ff" filter="url(#b3glow)"/>
  <circle cx="12" cy="17" r="1.5" fill="#d4a0ff" filter="url(#b3glow)"/>
</svg>
