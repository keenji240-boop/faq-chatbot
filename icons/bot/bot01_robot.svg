<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 56 56">
  <defs>
    <radialGradient id="b1bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a2a4a"/>
      <stop offset="100%" stop-color="#0a0f1e"/>
    </radialGradient>
    <filter id="b1glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <circle cx="28" cy="28" r="27" fill="url(#b1bg)" stroke="#3aa0ff" stroke-width="1.2"/>
  <!-- アンテナ -->
  <line x1="28" y1="10" x2="28" y2="16" stroke="#3aa0ff" stroke-width="1.5"/>
  <circle cx="28" cy="9" r="2" fill="#7fd0ff"/>
  <!-- 頭 -->
  <rect x="16" y="16" width="24" height="16" rx="4" fill="#0d1f3c" stroke="#3aa0ff" stroke-width="1.2"/>
  <!-- 目 -->
  <rect x="20" y="20" width="5" height="5" rx="1" fill="#3aa0ff" filter="url(#b1glow)"/>
  <rect x="31" y="20" width="5" height="5" rx="1" fill="#3aa0ff" filter="url(#b1glow)"/>
  <!-- 胴体 -->
  <rect x="18" y="34" width="20" height="13" rx="3" fill="#0d1f3c" stroke="#3aa0ff" stroke-width="1"/>
  <!-- 胸パネル -->
  <rect x="22" y="37" width="12" height="4" rx="1" fill="#071428" stroke="#5fb6ff" stroke-width="0.8"/>
  <circle cx="25" cy="39" r="1.2" fill="#3aa0ff"/>
  <circle cx="28" cy="39" r="1.2" fill="#7fd0ff"/>
  <circle cx="31" cy="39" r="1.2" fill="#3aa0ff"/>
  <!-- 首 -->
  <rect x="24" y="32" width="8" height="3" rx="1" fill="#0d1f3c" stroke="#3aa0ff" stroke-width="0.8"/>
</svg>
