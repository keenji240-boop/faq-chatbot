<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 56 56">
  <defs>
    <radialGradient id="b5bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#001a1a"/>
      <stop offset="100%" stop-color="#000a0a"/>
    </radialGradient>
    <filter id="b5glow">
      <feGaussianBlur stdDeviation="1.8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <circle cx="28" cy="28" r="27" fill="url(#b5bg)" stroke="#00d4d4" stroke-width="1.2"/>
  <!-- 外側ひし形 -->
  <polygon points="28,5 51,28 28,51 5,28" fill="none" stroke="#00d4d4" stroke-width="1" opacity="0.5"/>
  <!-- 中間六角形 -->
  <polygon points="28,12 40,19 40,37 28,44 16,37 16,19" fill="none" stroke="#00d4d4" stroke-width="1" filter="url(#b5glow)"/>
  <!-- 内側四角形（回転） -->
  <rect x="20" y="20" width="16" height="16" rx="2" fill="#001818" stroke="#00ffff" stroke-width="1.2" transform="rotate(45 28 28)" filter="url(#b5glow)"/>
  <!-- 中心 -->
  <circle cx="28" cy="28" r="5" fill="#002a2a" stroke="#00d4d4" stroke-width="1"/>
  <circle cx="28" cy="28" r="2.5" fill="#00ffff" filter="url(#b5glow)"/>
  <!-- コーナードット -->
  <circle cx="28" cy="5" r="1.5" fill="#00d4d4"/>
  <circle cx="51" cy="28" r="1.5" fill="#00d4d4"/>
  <circle cx="28" cy="51" r="1.5" fill="#00d4d4"/>
  <circle cx="5" cy="28" r="1.5" fill="#00d4d4"/>
  <!-- クロスライン -->
  <line x1="28" y1="12" x2="28" y2="44" stroke="#00d4d4" stroke-width="0.5" opacity="0.3"/>
  <line x1="16" y1="28" x2="40" y2="28" stroke="#00d4d4" stroke-width="0.5" opacity="0.3"/>
</svg>
