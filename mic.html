<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>音声入力</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Noto Sans JP',sans-serif;
  background:#06060f;color:#c8d0f0;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  height:100vh;gap:10px;padding:12px;
}
#micBtn{
  width:64px;height:64px;border-radius:50%;border:none;
  background:#1e2240;color:#c8d0f0;font-size:28px;
  cursor:pointer;transition:all .2s;
  box-shadow:0 0 0 0 rgba(232,64,64,0);
}
#micBtn.listening{
  background:rgba(232,64,64,.2);color:#e84040;
  animation:micPulse .8s ease-in-out infinite;
}
#micBtn.speaking{
  background:rgba(64,128,232,.2);color:#4080e8;
  animation:micPulse .6s ease-in-out infinite;
}
@keyframes micPulse{
  0%,100%{box-shadow:0 0 0 0 rgba(232,64,64,.4)}
  50%{box-shadow:0 0 0 12px rgba(232,64,64,0)}
}
#status{font-size:11px;color:#7b80a0;text-align:center;min-height:16px}
#transcript{
  font-size:12px;color:#c8d0f0;text-align:center;
  max-width:280px;min-height:20px;word-break:break-all;
}
</style>
</head>
<body>
<button id="micBtn" onclick="C_toggleMic()">🎙</button>
<div id="status">起動中…</div>
<div id="transcript"></div>

<script>
// GASのURLは動的なため * を使用
const PARENT_ORIGIN = '*';

let recognition = null;
let isMicOn     = false;
let isSpeaking  = false;
let autoRestart = false;

// ── 親からのメッセージ受信 ──
window.addEventListener('message', (e) => {
  const data = e.data;
  if (!data || !data.type) return;
  if (data.type === 'TTS_SPEAK') { C_speak(data.text); }
  if (data.type === 'TTS_STOP')  { speechSynthesis.cancel(); isSpeaking = false; setStatus('待機中'); if (autoRestart) setTimeout(C_startMic, 300); }
});

// ── 親へメッセージ送信 ──
function C_sendToParent(data) {
  if (window.opener && !window.opener.closed) {
    window.opener.postMessage(data, PARENT_ORIGIN);
  } else if (window.parent !== window) {
    window.parent.postMessage(data, PARENT_ORIGIN);
  }
}

// ── ステータス・トランスクリプト表示 ──
function setStatus(text)     { document.getElementById('status').textContent = text; }
function setTranscript(text) { document.getElementById('transcript').textContent = text; }

// ── マイクON/OFF切替 ──
function C_toggleMic() {
  if (isSpeaking) { speechSynthesis.cancel(); isSpeaking = false; }
  if (isMicOn) {
    autoRestart = false;
    C_stopMic();
  } else {
    autoRestart = true;
    C_startMic();
  }
}

// ── マイク起動 ──
function C_startMic() {
  if (isMicOn || isSpeaking) return;
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { setStatus('音声認識非対応のブラウザです'); C_sendToParent({ type:'MIC_ERROR', error:'SpeechRecognition非対応' }); return; }

  navigator.mediaDevices.getUserMedia({ audio: true })
    .then(() => {
      recognition = new SR();
      recognition.lang            = 'ja-JP';
      recognition.continuous      = false;
      recognition.interimResults  = true;
      recognition.maxAlternatives = 3;

      recognition.onstart = () => {
        isMicOn = true;
        document.getElementById('micBtn').className = 'listening';
        setStatus('認識中…');
        setTranscript('');
        C_sendToParent({ type:'MIC_READY' });
      };

      recognition.onresult = (e) => {
        const results  = Array.from(e.results);
        const interim  = results.filter(r => !r.isFinal).map(r => r[0].transcript).join('');
        const finals   = results.filter(r => r.isFinal);

        if (interim) setTranscript(interim);

        if (finals.length > 0) {
          const text = finals.map(r => r[0].transcript).join('').trim();
          setTranscript('「' + text + '」');
          setStatus('送信中…');
          C_sendToParent({ type:'VOICE_TEXT', text });
        }
      };

      recognition.onend = () => {
        isMicOn = false;
        document.getElementById('micBtn').className = '';
        if (!isSpeaking && autoRestart) {
          setTimeout(C_startMic, 400);
        } else {
          setStatus(autoRestart ? '待機中' : 'タップしてマイクを起動');
        }
      };

      recognition.onerror = (e) => {
        isMicOn = false;
        document.getElementById('micBtn').className = '';
        if (e.error === 'aborted' || e.error === 'no-speech') {
          if (autoRestart && !isSpeaking) setTimeout(C_startMic, 400);
          return;
        }
        setStatus('エラー: ' + e.error);
        C_sendToParent({ type:'MIC_ERROR', error: e.error });
      };

      recognition.start();
    })
    .catch(() => {
      setStatus('マイクの許可が必要です');
      C_sendToParent({ type:'MIC_ERROR', error:'マイク許可が拒否されました' });
    });
}

// ── マイク停止 ──
function C_stopMic() {
  if (recognition) try { recognition.stop(); } catch(e) {}
  isMicOn = false;
  document.getElementById('micBtn').className = '';
  setStatus('タップして再起動');
}

// ── TTS（Web Speech APIトレーニング準拠・高品質版）──
function C_speak(text) {
  if (!text || !window.speechSynthesis) return;

  // 再生中なら強制停止（重ね付け防止）
  if (window.speechSynthesis.speaking) {
    window.speechSynthesis.cancel();
  }

  isSpeaking = true;
  if (recognition) try { recognition.abort(); } catch(e) {}
  document.getElementById('micBtn').className = 'speaking';
  setStatus('読み上げ中…');
  C_sendToParent({ type:'MIC_SPEAKING' });

  // 句読点で分割して順番に再生（長文途中停止バグ対策）
  const segments = C_splitTextToSegments(text);
  C_speakSequentially(segments);
}

// テキストを句読点で分割
function C_splitTextToSegments(text) {
  // 句点・読点・感嘆符・疑問符で分割（空白は除去）
  const parts = text.split(/(?<=[。、！？!?])/);
  return parts.map(s => s.trim()).filter(s => s.length > 0);
}

// 分割されたセグメントを順番に再生（非同期制御）
async function C_speakSequentially(segments) {
  for (let i = 0; i < segments.length; i++) {
    if (!isSpeaking) break; // 途中停止された場合
    await new Promise((resolve) => {
      const utt   = new SpeechSynthesisUtterance(segments[i]);
      utt.lang    = 'ja-JP';
      utt.rate    = 1.0;
      utt.pitch   = 1.0;

      // Google音声 > Kyoko > その他ja-JP の優先順で選択
      const voices    = window.speechSynthesis.getVoices();
      const bestVoice = voices.find(v => v.lang === 'ja-JP' && v.name.includes('Google')) ||
                        voices.find(v => v.lang === 'ja-JP' && v.name.includes('Kyoko')) ||
                        voices.find(v => v.lang === 'ja-JP');
      if (bestVoice) utt.voice = bestVoice;

      utt.onend  = resolve;
      utt.onerror = (e) => {
        if (e.error !== 'interrupted') setStatus('読み上げエラー: ' + e.error);
        resolve();
      };
      window.speechSynthesis.speak(utt);
    });
  }

  // 全セグメント再生完了
  isSpeaking = false;
  document.getElementById('micBtn').className = autoRestart ? 'listening' : '';
  setStatus(autoRestart ? '認識中…' : 'タップして再起動');
  setTranscript('');
  C_sendToParent({ type:'MIC_DONE' });
  if (autoRestart) setTimeout(C_startMic, 300);
}

if (window.speechSynthesis) {
  speechSynthesis.onvoiceschanged = () => speechSynthesis.getVoices();
}

// ── 自動起動 ──
window.addEventListener('load', () => {
  // 音声リスト読み込み後に自動起動
  setTimeout(() => {
    autoRestart = true;
    C_startMic();
  }, 500);
});

// ── 本体ページ終了監視 ──
setInterval(() => {
  if (!window.opener || window.opener.closed) {
    // 本体が閉じられたらポップアップも閉じる
    speechSynthesis.cancel();
    window.close();
  }
}, 1000);
</script>
</body>
</html>
